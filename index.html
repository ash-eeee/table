<!DoCTYPE html>
<html>
    <head>
        <meta charset = "UTF-8">
        <title>113403510 table</title>
        <style>
            table, td, th{
                border: 1px solid black;
                font-family: "Times New Roman", serif;
                height: 30px;
            }
            table{
                border-collapse: collapse;
                width: 200px;
            }
            th{
              text-align: center;  
              color: white;
              background-color: gray;
            }
            td{
                text-align: left;
                padding-left: 10px;
            }
            tr:nth-child(even) {
            background-color: yellow;
        }
        div.fixed{
            position: fixed;
            top: 0;
            right: 0;
            width: 100px;
            height: 150px;
            border: 3px solid #73AD21;
        }
        </style>
    </head>
    <body>
        <table>
            <tr>
                <th>Firstname</th>
                <th>Lastname</th>
            </tr>
            <tr>
                <td>1</td>
                <td>1</td>
            </tr>
            <tr>
                <td>2</td>
                <td>2</td>
            </tr>
            <tr>
                <td>3</td>
                <td>3</td>
            </tr>
        </table>
        <div class ="fixed">This div element has position: fixed;</div>
    </body>
</html>
